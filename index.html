<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>📺CASTA-APP⚽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.1/dash.all.min.js"></script>
    <style>
        body { background-color: black !important; }
        
        /* 🚨 SALVAVIDAS NATIVO: Si Tailwind tarda un milisegundo en iniciar, esto evita que se mezclen los elementos en el celu */
        .hidden { display: none !important; }
        
        video::-webkit-media-controls { display: none !important; }
        video::-webkit-media-controls-start-playback-button { display: none !important; -webkit-appearance: none !important; }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background-color: #1e3a8a; border-radius: 10px; }
        #sidebar { -ms-overflow-style: none; scrollbar-width: thin; scrollbar-color: #1e3a8a transparent; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden m-0 p-0 w-screen h-screen flex flex-col md:flex-row font-sans">
 
    <div class="flex-1 relative flex items-center justify-center bg-black overflow-hidden select-none" id="playerArea">
        
        <div id="loader" class="absolute z-50 hidden flex flex-col items-center justify-center bg-black bg-opacity-90 backdrop-blur-sm p-6 rounded-2xl pointer-events-none text-center border border-gray-800 shadow-2xl">
            <div class="relative flex items-center justify-center mb-5 w-24 h-24">
                <div class="animate-spin rounded-full h-24 w-24 border-t-4 border-b-4 border-l-4 border-transparent border-t-blue-500 border-b-blue-600 absolute opacity-80"></div>
                <img id="loaderLogo" class="w-14 h-14 object-contain rounded-lg bg-white p-1 hidden z-10 shadow-lg" src="" alt="logo">
            </div>
            <p class="text-base font-bold tracking-wider text-blue-400 mb-2 drop-shadow-md">🤖 Buscando enlace del canal...</p>
            <p class="text-sm text-gray-300 font-medium mb-1">Esto puede tardar hasta 60 segundos</p>
            <p class="text-xs text-gray-500 font-bold uppercase tracking-widest animate-pulse mt-2">cargando transmisión, gracias por esperar</p>
        </div>
        
        <video id="videoElement" class="w-full h-full object-contain bg-black" playsinline></video>

        <iframe id="iframeElement" allow="encrypted-media" allowfullscreen frameborder="0" scrolling="no" class="w-full h-full bg-black hidden"></iframe>

        <div id="topInfo" class="absolute top-4 left-4 right-4 flex justify-between items-center pointer-events-none z-10 transition-opacity duration-300">
            <div class="flex flex-col bg-black bg-opacity-40 backdrop-blur-sm p-2 rounded-lg border border-gray-800">
                <span id="txtReloj" class="text-2xl font-bold font-mono text-white tracking-widest drop-shadow">00:00:00</span>
                <span id="txtFecha" class="text-[10px] text-white font-bold uppercase tracking-wider mt-0.5 drop-shadow-md">--- -- ---</span>
            </div>
            
            <div id="boxClima" class="hidden flex flex-col justify-center bg-black bg-opacity-40 backdrop-blur-sm px-4 py-2 rounded-lg border border-gray-800 text-right">
                <div class="flex items-center justify-end gap-1.5">
                    <span id="lblDiaNoche" class="text-lg drop-shadow-md">☀️</span>
                    <div id="txtTemp" class="text-xl font-bold text-white leading-none">0°C</div>
                </div>
                <div id="txtClimaDesc" class="text-[9px] text-blue-400 font-bold uppercase tracking-wider mt-1">Cargando...</div>
                <div class="flex items-center justify-end gap-1 mt-0.5">
                    <span class="text-[9px] drop-shadow-md">📍</span>
                    <div id="txtCiudad" class="text-[9px] text-white font-bold uppercase tracking-wider drop-shadow-md">LA PLATA, BA</div>
                </div>
            </div>
        </div>

        <div id="alertBox" class="absolute top-24 left-1/2 transform -translate-x-1/2 bg-red-600 bg-opacity-90 text-white font-bold px-4 py-2 rounded shadow-lg text-sm z-50 hidden transition-all duration-300 border border-red-500 uppercase tracking-wider">
            ¡ERROR AL CARGAR EL CANAL!
        </div>

        <div id="bottomControls" class="absolute bottom-4 left-4 right-4 flex flex-col bg-black bg-opacity-70 backdrop-blur-md p-3 rounded-xl border border-gray-800 shadow-2xl z-10 opacity-0 pointer-events-none transition-opacity duration-300">
            
            <div id="pcMobileControls" class="flex flex-wrap justify-center items-center gap-2 mb-3">
                <button id="btnVolMenos" class="bg-neutral-900 hover:bg-neutral-800 text-gray-300 hover:text-white border border-gray-800 text-[11px] px-3 py-1.5 rounded font-bold transition-colors uppercase tracking-wider focus:outline-none">🔉 Vol -</button>
                
                <span id="txtVolValue" class="bg-neutral-950 text-blue-400 border border-gray-800 text-[11px] px-3 py-1.5 rounded font-black uppercase tracking-wider select-none">VOL: 100%</span>
                
                <button id="btnSilenciar" class="bg-neutral-900 hover:bg-neutral-800 text-gray-300 hover:text-white border border-gray-800 text-[11px] px-3 py-1.5 rounded font-bold transition-colors uppercase tracking-wider focus:outline-none">🔇 Silenciar</button>
                <button id="btnVolMas" class="bg-neutral-900 hover:bg-neutral-800 text-gray-300 hover:text-white border border-gray-800 text-[11px] px-3 py-1.5 rounded font-bold transition-colors uppercase tracking-wider focus:outline-none">🔊 Vol +</button>
                <button id="btnFullscreen" class="bg-blue-600 hover:bg-blue-700 text-white border border-blue-500 text-[11px] px-4 py-1.5 rounded font-black transition-colors uppercase tracking-wider ml-1 shadow-md focus:outline-none">Pantalla completa 🖥️</button>
            </div>

            <div class="w-full h-px bg-gray-800/60 mb-2" id="separadorControles"></div>

            <div class="flex flex-col items-center w-full">
                <div class="text-[10px] font-bold tracking-widest text-blue-400 uppercase mb-2" id="lblOpcionesCanal">OPCIONES DISPONIBLES</div>
                <div id="containerOpciones" class="flex flex-wrap gap-2 justify-center w-full"></div>
            </div>
        </div>
    </div>

    <div id="sidebar" class="w-full md:w-80 h-1/2 md:h-full bg-neutral-950 border-t md:border-t-0 md:border-r border-gray-900 flex flex-col overflow-y-auto p-4 transition-transform duration-300 z-20">
        <div class="flex flex-col mb-4 border-b border-gray-900 pb-3 gap-1">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center">
                    <h1 class="text-lg font-black tracking-wider flex items-center gap-1">
                        <span>📺</span>
                        <span class="bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">CASTA-APP</span>
                        <span>⚽</span>
                    </h1>
                </div>
                </div>
            <span class="text-xs text-gray-500 font-semibold tracking-wide uppercase mt-0.5">Seleccione un canal</span>
        </div>
        <div id="listaCanales" class="flex flex-col gap-1.5 flex-1 pb-10"></div>
    </div>

    <script>
        // DETECCIÓN GLOBAL DE SMART TV
        const ua = navigator.userAgent.toLowerCase();
        const esTV = ua.includes('smarttv') || ua.includes('googletv') || ua.includes('appletv') || ua.includes('hbbtv') || ua.includes('tizen') || ua.includes('webos') || ua.includes('netcast') || ua.includes('playstation') || ua.includes('xbox');
        const esCelular = /android|iphone|ipad|ipod/i.test(ua);

        const videoElement = document.getElementById('videoElement');
        const iframeElement = document.getElementById('iframeElement'); 
        const playerArea = document.getElementById('playerArea');
        const loader = document.getElementById('loader');
        const loaderLogo = document.getElementById('loaderLogo');
        const alertBox = document.getElementById('alertBox');
        const listaCanales = document.getElementById('listaCanales');
        
        const bottomControls = document.getElementById('bottomControls');
        const containerOpciones = document.getElementById('containerOpciones');
        const topInfo = document.getElementById('topInfo');
        
        const pcMobileControls = document.getElementById('pcMobileControls');
        const separadorControles = document.getElementById('separadorControles');
        const btnVolMenos = document.getElementById('btnVolMenos');
        const btnSilenciar = document.getElementById('btnSilenciar');
        const btnVolMas = document.getElementById('btnVolMas');
        const btnFullscreen = document.getElementById('btnFullscreen');
        const txtVolValue = document.getElementById('txtVolValue');

        let cacheCanalesGlobal = [];
        let canalActualGlobal = null;
        let hls = null;
        let dashPlayer = null;
        let timeoutControles = null;

        // --- AGREGAR ESTO AQUÍ ---
        const sidebar = document.getElementById('sidebar'); // Para llamarlo más fácil
        
        function ocultarSidebarCompleto() {
            sidebar.classList.add('hidden');
            playerArea.style.width = '100%';
            playerArea.style.height = '100%';
        }

        function mostrarSidebarCompleto() {
            if (esTV) return; // Las TV lo manejan con el control remoto
            sidebar.classList.remove('hidden');
            playerArea.style.width = '';
            playerArea.style.height = '';
        }
        // -------------------------

        function mostrarLoader() { 
            if (canalActualGlobal && canalActualGlobal.logo) {
                loaderLogo.src = canalActualGlobal.logo;
                loaderLogo.classList.remove('hidden');
            } else {
                loaderLogo.classList.add('hidden');
            }
            loader.classList.remove('hidden'); 
        }
        function ocultarLoader() { loader.classList.add('hidden'); }

        function mostrarAlerta() {
            alertBox.classList.remove('hidden');
            setTimeout(() => { alertBox.classList.add('hidden'); }, 4000);
        }

        function mostrarControlesInteractivos() {
            bottomControls.classList.remove('opacity-0', 'pointer-events-none');
            topInfo.classList.remove('opacity-0');
            document.body.style.cursor = 'default';

            clearTimeout(timeoutControles);
            timeoutControles = setTimeout(() => {
                bottomControls.classList.add('opacity-0', 'pointer-events-none');
                topInfo.classList.add('opacity-0');
                if (document.fullscreenElement) {
                    document.body.style.cursor = 'none';
                }
            }, 3500); 
        }

        document.addEventListener('mousemove', mostrarControlesInteractivos);
        document.addEventListener('keydown', mostrarControlesInteractivos);
        videoElement.addEventListener('play', mostrarControlesInteractivos);

        function iniciarReloj() {
            const actualizar = () => {
                const n = new Date();
                document.getElementById('txtReloj').textContent = n.toLocaleTimeString('es-AR', { hour12: false });
                document.getElementById('txtFecha').textContent = n.toLocaleDateString('es-AR', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
            };
            actualizar();
            setInterval(actualizar, 1000);
        }

        // CONTROLADOR DE TEXTO DE VOLUMEN MULTIPLATAFORMA
        function actualizarIndicadorVolumen() {
            if (txtVolValue) {
                const porcentaje = Math.round(videoElement.volume * 100);
                txtVolValue.textContent = videoElement.muted ? "MUTED" : `VOL: ${porcentaje}%`;
            }
        }

      function verificarFiltroDispositivo() {
            // 1. Lógica exclusiva para Smart TV: Quitar botón de pantalla completa
            if (esTV && btnFullscreen) {
                btnFullscreen.remove(); 
            }

            // 2. Lógica para Smart TV y Celulares: Volumen al 100% y ocultar controles de sonido
            if (esTV || esCelular) {
                // Ocultamos los 4 elementos relacionados al volumen
                if (btnVolMenos) btnVolMenos.classList.add('hidden');
                if (btnVolMas) btnVolMas.classList.add('hidden');
                if (btnSilenciar) btnSilenciar.classList.add('hidden');
                if (txtVolValue) txtVolValue.classList.add('hidden');

                // Forzamos el reproductor al 100% de volumen y le quitamos el silencio
                videoElement.volume = 1.0;
                videoElement.muted = false;
            }
        }

        async function iniciarClima() {
            try {
                const res = await fetch('https://wttr.in/La+Plata?format=j1');
                if (!res.ok) return;
                const d = await res.json();
                const cond = d.current_condition[0];
                const temp = cond.temp_C;
                const code = cond.weatherCode;
                const desc = cond.lang_es ? cond.lang_es[0].value : cond.weatherDesc[0].value;
                
                document.getElementById('txtTemp').textContent = `${temp}°C`;
                document.getElementById('txtClimaDesc').textContent = desc.toUpperCase();
                document.getElementById('txtCiudad').textContent = "LA PLATA, BA";
                document.getElementById('boxClima').classList.remove('hidden');
                
                const horaActual = new Date().getHours();
                const esDia = horaActual >= 6 && horaActual < 19;
                
                let emoji = esDia ? "☀️" : "🌙";
                if (["116", "119", "122"].includes(code)) emoji = esDia ? "⛅" : "☁️"; 
                else if (["143", "248", "260"].includes(code)) emoji = "🌫️"; 
                else if (["176", "263", "266", "293", "296", "299", "302", "305", "308", "353", "356", "359"].includes(code)) emoji = "🌧️"; 
                else if (["200", "386", "389"].includes(code)) emoji = "⛈️"; 
                else if (["227", "320", "323", "326", "329", "332", "335", "338", "368", "371", "392", "395"].includes(code)) emoji = "❄️"; 

                document.getElementById('lblDiaNoche').textContent = emoji;
            } catch(e) { console.error("Error clima:", e); }
        }

        if (btnVolMenos) {
            btnVolMenos.onclick = function() { 
                videoElement.volume = Math.max(0, videoElement.volume - 0.1); 
                videoElement.muted = false; 
                actualizarIndicadorVolumen();
                if (btnSilenciar) btnSilenciar.textContent = "🔇 Silenciar";
                this.blur(); 
            };
        }
        if (btnVolMas) {
            btnVolMas.onclick = function() { 
                videoElement.volume = Math.min(1, videoElement.volume + 0.1); 
                videoElement.muted = false; 
                actualizarIndicadorVolumen();
                if (btnSilenciar) btnSilenciar.textContent = "🔇 Silenciar";
                this.blur(); 
            };
        }
        if (btnSilenciar) {
            btnSilenciar.onclick = function() {
                videoElement.muted = !videoElement.muted;
                btnSilenciar.textContent = videoElement.muted ? "🔊 Activar" : "🔇 Silenciar";
                actualizarIndicadorVolumen();
                this.blur();
            };
        }

   // LOGICA DE PANTALLA COMPLETA UNIVERSAL (Repara bloques en PC y Celular)
        if (btnFullscreen) {
            btnFullscreen.onclick = function() {
                this.blur(); 
                const docElm = document.documentElement; // <-- LA CLAVE: Pantalla completa a TODA la web
                const esCelular = /android|iphone|ipad|ipod/i.test(navigator.userAgent);
                
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    const req = docElm.requestFullscreen || docElm.webkitRequestFullscreen;
                    if (req) {
                        req.call(docElm).then(() => {
                            if (esCelular && window.screen && window.screen.orientation && window.screen.orientation.lock) {
                                window.screen.orientation.lock('landscape').catch(e => console.log("Bloqueo horizontal:", e));
                            }
                        }).catch(err => console.log("Error Fullscreen:", err));
                    } else if (videoElement.webkitEnterFullscreen) {
                        videoElement.webkitEnterFullscreen(); 
                    }
                } else {
                    const exit = document.exitFullscreen || document.webkitExitFullscreen;
                    if (exit) {
                        exit.call(document);
                    }
                }
            };
        }

        // CONTROLADOR NATIVO: Oculta el menú si entran a pantalla completa y lo muestra si salen (con la tecla ESC)
        function manejarCambioFullscreen() {
            const esFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
            const esCelular = /android|iphone|ipad|ipod/i.test(navigator.userAgent);

            if (esFullscreen) {
                ocultarSidebarCompleto(); // Borra el menú y estira el video al 100%
            } else {
                mostrarSidebarCompleto(); // Devuelve el menú a su lugar
                if (esCelular && window.screen && window.screen.orientation && window.screen.orientation.unlock) {
                    window.screen.orientation.unlock().catch(() => {});
                }
            }
        }
        document.addEventListener('fullscreenchange', manejarCambioFullscreen);
        document.addEventListener('webkitfullscreenchange', manejarCambioFullscreen);
   
        async function descargarListaCanales() {
            try {
                const res = await fetch('/api/canales');
                const data = await res.json();
                cacheCanalesGlobal = data;
                renderizarMenuCanales();
            } catch (err) { console.error("Error cargando canales:", err); }
        }

        function renderizarMenuCanales() {
            listaCanales.innerHTML = "";
            const canalesAgrupados = {};
            
            cacheCanalesGlobal.forEach(canal => {
                const cat = (canal.categoria || "OTROS").toUpperCase();
                if (!canalesAgrupados[cat]) canalesAgrupados[cat] = [];
                canalesAgrupados[cat].push(canal);
            });

            for (const [categoria, canales] of Object.entries(canalesAgrupados)) {
                const franja = document.createElement('div');
                franja.className = "w-full bg-blue-900/20 border-l-4 border-blue-500 text-blue-400 text-[10px] font-black uppercase tracking-widest px-3 py-2 mt-3 mb-1.5 rounded-r shadow-sm pointer-events-none select-none";
                franja.textContent = categoria;
                listaCanales.appendChild(franja);

                canales.forEach(canal => {
                    const btn = document.createElement('button');
                    btn.className = "w-full flex items-center bg-neutral-900 hover:bg-neutral-800 active:bg-blue-950 border border-gray-900 rounded-lg p-2 text-left transition-all focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm font-medium tracking-wide";
                    
                    const img = document.createElement('img');
                    // ✅ Agrandado (w-14 h-14) y margen interno mínimo (p-0.5) para que ocupe el 95% del cuadro
                    img.className = "w-14 h-14 object-contain mr-3 rounded-lg bg-white p-0.5 border border-gray-300 flex-shrink-0 shadow-sm";
                    img.src = canal.logo;
                    img.onerror = () => { 
                        img.className = "w-14 h-14 object-contain mr-3 rounded-lg bg-neutral-950 p-1.5 border border-gray-800 flex-shrink-0";
                        img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%234b5563' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='2' width='20' height='20' rx='2.18' ry='2.18'></rect><line x1='7' y1='2' x2='7' y2='22'></line><line x1='17' y1='2' x2='17' y2='22'></line><line x1='2' y1='12' x2='22' y2='12'></line></svg>"; 
                    };
                    
                    const span = document.createElement('span');
                    span.textContent = canal.nombre;
                    span.className = "truncate flex-1 font-semibold";

                    btn.appendChild(img);
                    btn.appendChild(span);
                    btn.onclick = () => seleccionarCanal(canal);
                    listaCanales.appendChild(btn);
                });
            }
        }

       function seleccionarCanal(canal) {
            canalActualGlobal = canal;
            containerOpciones.innerHTML = "";

            if (canal.opciones && canal.opciones.length > 0) {
                canal.opciones.forEach((opc, index) => {
                    const b = document.createElement('button');
                    b.className = "bg-neutral-900 hover:bg-blue-600 border border-gray-800 hover:border-blue-500 text-white font-bold px-4 py-2 rounded-lg text-xs tracking-wider transition-all uppercase focus:outline-none focus:ring-2 focus:ring-blue-500";
                    b.textContent = opc.nombre;
                    b.onclick = function() { 
                        this.blur(); 
                        consultarServidorYReproducir(opc.id); 
                        // ✅ En celular/PC ya NO se hace pantalla completa solo.
                        // ✅ En Smart TV se hará solo porque la función consultarServidorYReproducir oculta el menú.
                    };
                    containerOpciones.appendChild(b);
                    if (index === 0) b.click(); 
                });
                mostrarControlesInteractivos();
            } else { mostrarAlerta(); }
        }

        async function consultarServidorYReproducir(opcionId) {
            mostrarLoader();
            try {
                const res = await fetch(`/api/stream/${opcionId}`);
                const data = await res.json();
                if (data.exito && data.url) { reproducirCanal(data.url); } else { ocultarLoader(); mostrarAlerta(); }
            } catch(e) { ocultarLoader(); mostrarAlerta(); }
        }

        function reproducirCanal(url) {
            console.log("▶️ Intentando reproducir URL:", url);

            // ACCIÓN AUTOMÁTICA EN SMART TV: Oculta la lista al arrancar la reproducción
            if (esTV) {
       ocultarSidebarCompleto();
   }

            if (typeof hls !== 'undefined' && hls) { hls.destroy(); hls = null; }
            if (typeof dashPlayer !== 'undefined' && dashPlayer) { dashPlayer.destroy(); dashPlayer = null; }
            
            videoElement.pause();
            videoElement.src = "";

            if (!url.includes('/proxy/stream') && (url.includes('canal.php') || url.includes('.php') || url.includes('latamvidz') || url.includes('la14hd') || url.includes('streamtpcloud') || url.includes('elcanaldeportivo'))) {
                videoElement.classList.add('hidden');       
                iframeElement.classList.remove('hidden');    
                iframeElement.src = url;                    
                ocultarLoader();                            
                return;
            }

            iframeElement.classList.add('hidden');
            iframeElement.src = "";
            videoElement.classList.remove('hidden');

            if (url.includes('.mpd')) {
                dashPlayer = dashjs.MediaPlayer().create();
                dashPlayer.initialize(videoElement, url, true);
                dashPlayer.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => { ocultarLoader(); });
            } else if (url.includes('.m3u8') || url.includes('/proxy/stream') || url.includes(':8000')) {
                if (Hls.isSupported()) {
                    hls = new Hls({ 
                        debug: false,
                        manifestLoadingTimeOut: 25000, 
                        manifestLoadingMaxRetry: 5,     
                        levelLoadingTimeOut: 25000,
                        fragLoadingTimeOut: 30000,
                        enableWorker: true             
                    });
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        ocultarLoader();
                        videoElement.play().catch(() => { videoElement.muted = true; videoElement.play(); });
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) { console.error("Error Fatal:", data); ocultarLoader(); } });
                }
            } else {
                videoElement.src = url;
                videoElement.play().catch(() => { videoElement.muted = true; videoElement.play(); });
            }
        }


        document.addEventListener('keydown', (e) => {
            const keys = { 37: 'Left', 38: 'Up', 39: 'Right', 40: 'Down', 13: 'Enter' };
            const keyName = keys[e.keyCode];
            if (!keyName) return;

            const botones = Array.from(listaCanales.querySelectorAll('button'));
            const currentIndex = botones.indexOf(document.activeElement);

            const isUp = keyName === 'Up';
            const isDown = keyName === 'Down';
            const isLeft = keyName === 'Left';
            const isRight = keyName === 'Right';
            const isEnter = keyName === 'Enter';

           // --- LÓGICA EXCLUSIVA DE CONTROL REMOTO SMART TV ---
            if (esTV) {
                const sidebarOculto = document.getElementById('sidebar').classList.contains('hidden');
                if (sidebarOculto) {
                    if (isRight) {
                        e.preventDefault();
                        sidebar.classList.remove('hidden');
                        playerArea.style.width = ''; // Limpiamos el forzado para ver el menú
                        playerArea.style.height = '';
                        if (botones.length > 0) botones[0].focus();
                        return;
                    }
                    mostrarControlesInteractivos();
                    if (isEnter) {
                        if (!videoElement.classList.contains('hidden')) {
                            if (videoElement.paused) videoElement.play(); else videoElement.pause();
                        }
                    }
                    return;
                } else {
                    if (isLeft && document.activeElement.closest('#sidebar')) {
                        e.preventDefault();
                        ocultarSidebarCompleto(); // Oculta y estira al 100%
                        mostrarControlesInteractivos();
                        return;
                    }
                }
            }
            // --- FIN LOGICA SMART TV ---

            if (document.activeElement.closest('#containerOpciones')) {
                const btnsOpc = Array.from(containerOpciones.querySelectorAll('button'));
                const idxOpc = btnsOpc.indexOf(document.activeElement);
                if (isLeft && idxOpc > 0) { btnsOpc[idxOpc - 1].focus(); e.preventDefault(); }
                if (isRight && idxOpc < btnsOpc.length - 1) { btnsOpc[idxOpc + 1].focus(); e.preventDefault(); }
                if (isUp) { botones[0]?.focus(); e.preventDefault(); } 
                return;
            }

            if (document.activeElement.tagName === 'BUTTON' && document.activeElement.closest('#sidebar')) {
                if (isRight) {
                    const primerBotonOpcion = containerOpciones.querySelector('button');
                    if (primerBotonOpcion) primerBotonOpcion.focus();
                    e.preventDefault();
                    return;
                }
                if (isDown) {
                    e.preventDefault();
                    if (currentIndex < botones.length - 1) {
                        botones[currentIndex + 1].focus();
                        botones[currentIndex + 1].scrollIntoView({ block: "nearest", behavior: "smooth" });
                    }
                }
                if (isUp) {
                    e.preventDefault();
                    if (currentIndex === -1 && botones.length > 0) {
                        botones[0].focus();
                    } else if (currentIndex > 0) {
                        botones[currentIndex - 1].focus();
                        botones[currentIndex - 1].scrollIntoView({ block: "nearest", behavior: "smooth" });
                    }
                }
            } else {
                if (isLeft || isUp) { 
                    e.preventDefault(); 
                    if(botones.length > 0) botones[0].focus(); 
                    return; 
                }
                if (isEnter) {
                    if (document.activeElement.tagName === 'BUTTON' || document.activeElement.tagName === 'A') {
                        document.activeElement.click();
                    } else {
                        if (!videoElement.classList.contains('hidden')) {
                            if (videoElement.paused) videoElement.play(); else videoElement.pause();
                        }
                    }
                }
            }
        });

        window.onload = () => {
            verificarFiltroDispositivo();
            descargarListaCanales();
            iniciarReloj();
            iniciarClima();
            actualizarIndicadorVolumen(); // Carga el valor inicial del volumen
        };
    </script>
</body>
</html>
