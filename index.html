<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>📺CASTA-APP⚽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.1/dash.all.min.js"></script>
    <style>
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background-color: #1e3a8a; border-radius: 10px; }
        #sidebar { -ms-overflow-style: none; scrollbar-width: thin; scrollbar-color: #1e3a8a transparent; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden m-0 p-0 w-screen h-screen relative font-sans select-none">

    <div class="absolute inset-0 w-full h-full z-0 flex items-center justify-center bg-black">
        <video id="reproductor" class="w-full h-full outline-none object-contain" controls tabindex="-1" autoplay playsinline></video>
        
        <div id="loading" class="absolute hidden z-10 flex-col items-center gap-3">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
            <p id="loadingMsg" class="text-white text-sm font-semibold text-center px-4 drop-shadow-md"></p>
        </div>

        <div id="mensajeError" class="absolute z-10 bottom-10 left-1/2 transform -translate-x-1/2 hidden bg-red-900/90 text-white p-4 rounded-xl border border-red-500 shadow-2xl font-semibold text-center w-[90%] sm:w-auto max-w-lg"></div>
    </div>

    <div class="absolute top-4 left-4 right-4 sm:top-6 sm:left-6 sm:right-6 xl:top-10 xl:left-10 xl:right-10 z-40 flex justify-between items-start pointer-events-none">
        <button id="btnMenu" class="pointer-events-auto bg-black/60 hover:bg-blue-600 focus:ring-4 focus:ring-white text-white p-3 rounded-full border border-gray-700 transition duration-300 outline-none backdrop-blur-sm">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>

        <div class="flex gap-4 pointer-events-auto">
            <button id="btnCast" class="bg-black/60 hover:bg-purple-600 focus:ring-4 focus:ring-white text-white p-3 rounded-full border border-gray-700 transition duration-300 outline-none backdrop-blur-sm" title="Transmitir a TV">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </button>

            <button id="btnReportar" class="bg-black/60 hover:bg-red-600 focus:ring-4 focus:ring-white text-white px-4 py-3 rounded-full border border-gray-700 transition duration-300 font-bold flex items-center gap-2 hidden outline-none backdrop-blur-sm" title="Reportar Falla">
                <span>⚠️</span> <span class="hidden sm:inline">Reportar NO funcional</span>
            </button>
        </div>
    </div>

    <div id="sidebar" class="absolute top-0 left-0 h-full w-[85vw] max-w-xs sm:w-72 bg-[#050514]/95 backdrop-blur-lg z-50 transform translate-x-0 transition-transform duration-300 ease-in-out border-r border-[#1e204a] shadow-[20px_0_40px_rgba(0,0,0,0.9)] flex flex-col">
        
        <div class="p-5 border-b border-[#1e204a] flex flex-col gap-1 relative">
            <button id="btnCerrar" class="absolute top-3 right-4 text-gray-500 hover:text-white text-3xl font-bold focus:outline-none transition">&times;</button>
            
            <h1 class="text-xl sm:text-2xl font-black text-blue-500 tracking-wider mt-2">📺CASTA-APP⚽</h1>
            <p class="text-[10px] sm:text-xs text-gray-400 tracking-widest uppercase">Seleccione un canal</p>
            
            <div class="grid grid-cols-[1fr_auto_1fr] gap-3 items-center mt-4 bg-black/30 p-3 rounded-lg border border-white/5 shadow-inner">
                
                <div class="flex flex-col items-start justify-center">
                    <span class="text-[10px] text-[#5c6bc0] font-semibold uppercase tracking-wider mb-1">Horario</span>
                    <div id="relojLocal" class="text-white font-mono font-bold text-lg sm:text-xl tracking-widest leading-none">--:--:--</div>
                </div>

                <div class="w-[1px] h-8 bg-[#3949ab]/50 rounded-full"></div>
                
                <div class="flex flex-col items-end justify-center overflow-hidden w-full">
                    <span id="climaCiudad" class="text-[10px] text-[#5c6bc0] font-semibold uppercase tracking-wider mb-1 truncate w-full text-right">Ubicación...</span>
                    <div class="flex items-center gap-1 text-white">
                        <span id="climaTemp" class="font-bold text-lg sm:text-xl leading-none">--°C</span>
                        <span id="climaIcono" class="text-xl sm:text-2xl leading-none pb-1">🌍</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="bg-[#0f112e] px-5 py-2 border-b border-[#1e204a]">
            <span class="text-sm font-semibold text-[#8c9eff] uppercase tracking-widest">Deportes</span>
        </div>

        <div id="listaCanales" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2 pb-6"></div>
        
    </div>

    <script>
        const videoElement = document.getElementById('reproductor');
        const listaCanalesDiv = document.getElementById('listaCanales');
        const mensajeError = document.getElementById('mensajeError');
        const loader = document.getElementById('loading');
        const loadingMsg = document.getElementById('loadingMsg');

        const sidebar = document.getElementById('sidebar');
        const btnMenu = document.getElementById('btnMenu');
        const btnCerrar = document.getElementById('btnCerrar');
        const btnCast = document.getElementById('btnCast');
        const btnReportar = document.getElementById('btnReportar');

        let hls;
        let dashPlayer;
        let canalActualNombre = "";
        let canalActualId = "";
        let ultimoReintento = 0;

        const canalesBot = [
            'espn_scraper1', 'espn_scraper2',
            'tnt_scraper1', 'tnt_scraper2',
            'dsports_scraper1', 'dsports_scraper2',
            'fox_scraper1', 'fox_scraper2',
            'tyc_scraper1', 'tyc_scraper2',
            'telefe_scraper', 'eltrece_scraper', 'elnueve_scraper'
        ];

        const API_URL = "https://casta-app.onrender.com";

        fetch(`${API_URL}/ping`).catch(() => {});

        // Asegúrate de que las rutas sean relativas para que funcionen en el servidor (ej: logos_canales/tu_imagen.png)
        const misCanales = [
            { nombre: "ESPN Premium", logo: "logos_canales/espn.png", opciones: [{ nombre: "Opción Automática 1", id: "espn_scraper1" }, { nombre:""Opción Automática 2", id: "espn_premium_HD"}]},
            { nombre: "TNT Sports", logo: "logos_canales/tnt.png", opciones: [{ nombre: "Opción 1", id: "tnt_1" }, { nombre: "Opción Automática", id: "tnt_scraper1" }] },
            { nombre: "DirecTv Sports", logo: "logos_canales/dsports.png", opciones: [{ nombre: "Opción Automática", id: "dsports_scraper1" }] },
            { nombre: "Fox Sports", logo: "logos_canales/fox.png", opciones: [{ nombre: "Opción Automática", id: "fox_scraper1" }] },
            { nombre: "TyC Sports Int", logo: "logos_canales/tyc.png", opciones: [{ nombre: "Opción Automática", id: "tyc_scraper1" }] }
        ];

        function iniciarReloj() {
            const relojEl = document.getElementById('relojLocal');
            setInterval(() => {
                const ahora = new Date();
                relojEl.innerText = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }, 1000);
        }

        async function iniciarClima() {
            try {
                const resGeo = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const dataGeo = await resGeo.json();
                const lat = dataGeo.latitude;
                const lon = dataGeo.longitude;
                const ciudad = dataGeo.city || "Local";

                document.getElementById('climaCiudad').innerText = ciudad;

                const resClima = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const dataClima = await resClima.json();

                const temp = Math.round(dataClima.current_weather.temperature);
                const code = dataClima.current_weather.weathercode;
                const isDay = dataClima.current_weather.is_day; // 1 = Día, 0 = Noche

                document.getElementById('climaTemp').innerText = `${temp}°C`;

                let icono = "🌍";
                if (code === 0) icono = isDay ? "☀️" : "🌙";
                else if (code === 1 || code === 2) icono = isDay ? "⛅" : "☁️";
                else if (code === 3) icono = "☁️";
                else if (code >= 45 && code <= 48) icono = "🌫️";
                else if (code >= 51 && code <= 67) icono = "🌧️";
                else if (code >= 71 && code <= 77) icono = "❄️";
                else if (code >= 80 && code <= 82) icono = isDay ? "🌦️" : "🌧️";
                else if (code >= 95) icono = "⛈️";

                document.getElementById('climaIcono').innerText = icono;
            } catch (error) {
                document.getElementById('climaCiudad').innerText = "Offline";
                document.getElementById('climaTemp').innerText = "--";
                document.getElementById('climaIcono').innerText = "⚠️";
            }
        }

        function mostrarLoader(esBot = false, mensaje = '') {
            loader.classList.remove('hidden');
            loader.classList.add('flex');
            if (mensaje) {
                loadingMsg.innerText = mensaje;
            } else if (esBot) {
                loadingMsg.innerText = "🤖 Buscando enlace del canal...\nEsto puede tardar hasta 60s.";
            } else {
                loadingMsg.innerText = "";
            }
        }

        function ocultarLoader() {
            loader.classList.add('hidden');
            loader.classList.remove('flex');
            loadingMsg.innerText = "";
        }

        function abrirMenu() {
            sidebar.classList.remove('-translate-x-full');
            const primerBoton = listaCanalesDiv.querySelector('button');
            if (primerBoton) primerBoton.focus();
        }

        function cerrarMenu() {
            sidebar.classList.add('-translate-x-full');
            videoElement.focus();
        }

        btnMenu.addEventListener('click', abrirMenu);
        btnCerrar.addEventListener('click', cerrarMenu);

        function renderizarCanales() {
            listaCanalesDiv.innerHTML = '';

            const todasLasSolapas = [];
            const todosLosBotonesOpcion = [];

            misCanales.forEach((canal) => {
                const canalContainer = document.createElement('div');
                canalContainer.className = "flex flex-col gap-1 mb-1";

                const btnPrincipal = document.createElement('button');
                btnPrincipal.className = "w-full text-left bg-[#131538] hover:bg-[#1a1d4f] focus:bg-[#282c75] focus:ring-2 focus:ring-blue-400 outline-none text-white font-semibold py-2 px-3 rounded-md transition border border-[#1e204a] flex items-center justify-between group";
                
                const iniciales = canal.nombre.substring(0, 3).toUpperCase();
                
                const logoHtml = canal.logo 
                    ? `<img src="${canal.logo}" alt="${iniciales}" class="w-full h-full object-contain p-1" onerror="this.onerror=null; this.outerHTML='<span class=\\'text-xs font-black tracking-tighter text-gray-800\\'>${iniciales}</span>';">`
                    : `<span class="text-xs font-black tracking-tighter text-gray-800">${iniciales}</span>`;

                btnPrincipal.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden w-full">
                        <div class="w-14 h-10 bg-white rounded flex items-center justify-center shrink-0 shadow-inner group-hover:border-blue-400 border border-gray-300 transition overflow-hidden">
                            ${logoHtml}
                        </div>
                        <span class="text-sm md:text-base truncate tracking-wide w-full">${canal.nombre}</span>
                    </div>
                    <span class="text-xs text-[#5c6bc0] ml-2 shrink-0">▼</span>
                `;

                const subOpcionesDiv = document.createElement('div');
                subOpcionesDiv.className = "hidden flex-col gap-1 pl-14 mt-1 border-l-2 border-[#3949ab]";

                todasLasSolapas.push(subOpcionesDiv);

                canal.opciones.forEach(opcion => {
                    const btnOpcion = document.createElement('button');
                    btnOpcion.className = "w-full text-left bg-[#0c0e24] outline-none hover:bg-[#1a1d4f] focus:bg-[#3949ab] focus:text-white text-gray-400 hover:text-white py-2 px-3 rounded-md transition text-xs border border-transparent";
                    btnOpcion.innerText = opcion.nombre;

                    todosLosBotonesOpcion.push(btnOpcion);

                    btnOpcion.onclick = () => {
                        todosLosBotonesOpcion.forEach(b => {
                            b.classList.remove('bg-[#3949ab]', 'text-white', 'font-bold', 'border-blue-400');
                            b.classList.add('bg-[#0c0e24]', 'text-gray-400', 'border-transparent');
                        });
                        btnOpcion.classList.remove('bg-[#0c0e24]', 'text-gray-400', 'border-transparent');
                        btnOpcion.classList.add('bg-[#3949ab]', 'text-white', 'font-bold', 'border-blue-400');

                        canalActualNombre = `${canal.nombre} - ${opcion.nombre}`;
                        canalActualId = opcion.id;
                        ultimoReintento = 0;
                        obtenerEnlaceServidor(opcion.id);
                        cerrarMenu();
                        btnReportar.classList.remove('hidden');
                    };
                    subOpcionesDiv.appendChild(btnOpcion);
                });

                btnPrincipal.onclick = () => {
                    const estabaOculta = subOpcionesDiv.classList.contains('hidden');
                    todasLasSolapas.forEach(solapa => solapa.classList.add('hidden'));
                    if (estabaOculta) subOpcionesDiv.classList.remove('hidden');
                };

                canalContainer.appendChild(btnPrincipal);
                canalContainer.appendChild(subOpcionesDiv);
                listaCanalesDiv.appendChild(canalContainer);
            });

            if (todosLosBotonesOpcion.length > 0) {
                todasLasSolapas[0].classList.remove('hidden');
                todosLosBotonesOpcion[0].click();
            }
        }

        async function obtenerEnlaceServidor(canalId) {
            mensajeError.classList.add('hidden');
            const esBot = canalesBot.includes(canalId);
            mostrarLoader(esBot);

            try {
                const timeoutMs = esBot ? 90000 : 15000;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

                const res = await fetch(`${API_URL}/api/get-stream/${canalId}`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await res.json();

                if (data.exito) {
                    ejecutarVideo(data.url, canalId);
                } else {
                    throw new Error("No se pudo obtener el enlace");
                }
            } catch (err) {
                ocultarLoader();
                mensajeError.classList.remove('hidden');
                if (err.name === 'AbortError') {
                    mensajeError.innerText = "⏱️ El bot tardó demasiado. Intentá de nuevo.";
                } else {
                    mensajeError.innerText = "Error: El servidor no responde o el canal no está disponible.";
                }
                abrirMenu();
            }
        }

        async function reintentarCanal(canalId) {
            const ahora = Date.now();
            if (ahora - ultimoReintento < 30000) {
                ocultarLoader();
                return;
            }
            ultimoReintento = ahora;

            mostrarLoader(canalesBot.includes(canalId), "🔄 Enlace caído, buscando nuevo...");

            try {
                await fetch(`${API_URL}/api/clear-cache/${canalId}`).catch(() => {});
            } catch (e) {}

            setTimeout(() => {
                obtenerEnlaceServidor(canalId);
            }, 1000);
        }

        function ejecutarVideo(url, canalId) {
            if (hls) { hls.destroy(); hls = null; }
            if (dashPlayer) { dashPlayer.destroy(); dashPlayer = null; }
            videoElement.pause();

            videoElement.classList.remove('hidden');
            videoElement.volume = 1.0;
            videoElement.muted = false;

            if (url.includes('.mpd')) {
                dashPlayer = dashjs.MediaPlayer().create();
                dashPlayer.initialize(videoElement, url, true);
                dashPlayer.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => ocultarLoader());
                dashPlayer.on(dashjs.MediaPlayer.events.ERROR, (e) => {
                    ocultarLoader();
                    if (canalId && canalesBot.includes(canalId)) {
                        reintentarCanal(canalId);
                    } else {
                        mensajeError.classList.remove('hidden');
                        mensajeError.innerText = "💥 Error en DASH.";
                    }
                });
            } else if (url.includes('.m3u8') || url.includes('/proxy/stream')) {
                if (Hls.isSupported()) {
                    hls = new Hls({ debug: false });
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        ocultarLoader();
                        videoElement.play().catch(() => {
                            videoElement.muted = true;
                            videoElement.play();
                        });
                    });
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            if (canalId && canalesBot.includes(canalId)) {
                                reintentarCanal(canalId);
                            } else {
                                ocultarLoader();
                                mensajeError.classList.remove('hidden');
                                mensajeError.innerText = "💥 Error de conexión con el video.";
                            }
                        }
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                    videoElement.play();
                    ocultarLoader();
                }
            } else {
                videoElement.src = url;
                videoElement.play();
                ocultarLoader();
            }
        }

        document.addEventListener('keydown', (e) => {
            const isMenuAbierto = !sidebar.classList.contains('-translate-x-full');

            if (e.key === 'Escape' || e.key === 'Backspace' || e.keyCode === 10009) {
                if (isMenuAbierto) {
                    cerrarMenu();
                    e.preventDefault();
                }
                return;
            }

            if (e.key === 'ArrowLeft' && !isMenuAbierto) { abrirMenu(); return; }
            if (e.key === 'ArrowRight' && isMenuAbierto) { cerrarMenu(); return; }

            if (isMenuAbierto) {
                const botones = Array.from(sidebar.querySelectorAll('button:not(.hidden)'));
                const currentIndex = botones.indexOf(document.activeElement);
                if (currentIndex > -1) {
                    if (e.key === 'ArrowDown' && currentIndex < botones.length - 1) {
                        e.preventDefault();
                        botones[currentIndex + 1].focus();
                        botones[currentIndex + 1].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    }
                    if (e.key === 'ArrowUp' && currentIndex > 0) {
                        e.preventDefault();
                        botones[currentIndex - 1].focus();
                        botones[currentIndex - 1].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    }
                }
            } else {
                if (e.key === 'Enter') {
                    if (videoElement.paused) videoElement.play();
                    else videoElement.pause();
                }
            }
        });

        btnCast.addEventListener('click', async () => {
    // Verificar si el navegador soporta Remote Playback (Chrome/Android)
    if (videoElement.remote) {
        try {
            await videoElement.remote.prompt();
        } catch (error) {
            console.warn("Error o cancelación del Cast:", error);
            // Fallback si cancela o no encuentra
        }
    } 
    // Verificar si soporta AirPlay (Safari/iOS)
    else if (videoElement.webkitShowPlaybackTargetPicker) {
        videoElement.webkitShowPlaybackTargetPicker();
    } 
    // Fallback si el navegador no soporta nada nativo
    else {
        alert("Tu navegador no soporta transmisión nativa. Probá usar Google Chrome o Safari para enviar a tu TV.");
    }
});

        window.onload = () => {
            renderizarCanales();
            abrirMenu();
            iniciarReloj();
            iniciarClima();
        };
    </script>
</body>
</html>
