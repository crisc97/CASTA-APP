<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>📺CASTA-APP⚽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.1/dash.all.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            'bg': '#0f172a',
                            'card': '#1e293b',
                            'accent': '#38bdf8',
                            'border': '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        html, body { background-color: #0f172a !important; font-family: 'Inter', sans-serif; height: 100%; }
        video::-webkit-media-controls { display: none !important; }
        #videoOverlayContainer { display: none; }
        #videoOverlayContainer.active { display: flex; }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background-color: #38bdf8; border-radius: 10px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body class="text-white overflow-hidden select-none">

    <div class="relative w-screen h-screen bg-brand-bg flex flex-col p-4 md:p-6 lg:p-8">
        
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-brand-border">
            <h1 class="text-3xl font-black tracking-tighter text-white">📺 CASTA-<span class="text-brand-accent">APP</span></h1>
            <div class="flex items-center gap-3">
                <input id="buscador" type="text" placeholder="Buscar canal..." class="bg-brand-card border border-brand-border rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-brand-accent transition-colors w-40 md:w-60">
                <span id="reloj" class="text-xl font-bold text-gray-400">00:00</span>
            </div>
        </div>

        <div id="listaCategorias" class="flex-1 overflow-y-auto pr-3 space-y-8">
            </div>

        <div id="reproductorFlotante" class="fixed inset-0 bg-black bg-opacity-95 z-50 transition-all duration-300 transform translate-y-full opacity-0">
            <div class="relative w-full h-full flex flex-col">
                <div class="p-4 flex items-center justify-between border-b border-gray-800 bg-black">
                    <button id="btnCerrarReproductor" class="text-gray-400 hover:text-white text-3xl p-2 transition-transform hover:scale-110">✕</button>
                    <h2 id="tituloCanalReproduciendo" class="text-xl font-bold truncate px-4">Canal</h2>
                    <div class="w-12"></div> </div>
                
                <div class="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
                    <video id="videoPlayer" class="w-full h-full object-contain" autoplay playsinline></video>
                    <div id="videoClickOverlay" class="absolute inset-0 z-10 cursor-pointer"></div>

                    <div id="videoLoader" class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-80 z-20 transition-opacity duration-300">
                        <div id="loaderSpinner" class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-brand-accent mb-4"></div>
                        <p id="loaderText" class="text-lg font-semibold tracking-wide text-center whitespace-pre-line px-4">Conectando...</p>
                    </div>

                    <div id="controlContenedor" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex items-center gap-5 bg-black bg-opacity-70 px-6 py-3 rounded-full border border-gray-800 z-30 opacity-0 transition-opacity duration-300">
                        <button id="btnPlayPause" class="text-white text-2xl hover:scale-110 transition-transform">⏸</button>
                        <button id="btnMute" class="text-white text-2xl hover:scale-110 transition-transform">🔊</button>
                        <button id="btnFullscreen" class="text-white text-2xl hover:scale-110 transition-transform">📺</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <audio id="audioCopiar" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://casta-app.onrender.com';

        const videoElement = document.getElementById('videoPlayer');
        const videoOverlay = document.getElementById('videoClickOverlay');
        const loader = document.getElementById('videoLoader');
        const spinner = document.getElementById('loaderSpinner');
        const textLoader = document.getElementById('loaderText');
        const controlContenedor = document.getElementById('controlContenedor');
        
        const reproductorFlotante = document.getElementById('reproductorFlotante');
        const tituloReproductor = document.getElementById('tituloCanalReproduciendo');
        const btnCerrar = document.getElementById('btnCerrarReproductor');

        const btnPlay = document.getElementById('btnPlayPause');
        const btnMute = document.getElementById('btnMute');
        const btnFull = document.getElementById('btnFullscreen');
        const buscador = document.getElementById('buscador');
        const listaCategoriasContenedor = document.getElementById('listaCategorias');

        let hlsInstance = null;
        let dashInstance = null;
        let canalesData = [];
        let canalActualId = null;
        let opcionesActuales = [];
        let urlActualVideo = "";
        let llavesActuales = null;
        let ocultarControlesTimeout = null;

        // MANEJO DE ESTADOS VISUALES (LOADER ORIGINAL)
        function mostrarLoader(conSpinner = true, texto = "Cargando...") {
            loader.style.opacity = '1';
            loader.classList.remove('pointer-events-none');
            textLoader.innerText = texto;
            if (conSpinner) spinner.classList.remove('hidden');
            else spinner.classList.add('hidden');
        }

        function ocultarLoader() {
            loader.style.opacity = '0';
            loader.classList.add('pointer-events-none');
        }

        // CONTROLES DE INTERFAZ DEL REPRODUCTOR
        function mostrarControlesTemporales() {
            controlContenedor.style.opacity = '1';
            controlContenedor.classList.remove('pointer-events-none');
            
            clearTimeout(ocultarControlesTimeout);
            ocultarControlesTimeout = setTimeout(() => {
                if (!videoElement.paused) {
                    controlContenedor.style.opacity = '0';
                    controlContenedor.classList.add('pointer-events-none');
                }
            }, 4000);
        }

        videoOverlay.addEventListener('mousemove', mostrarControlesTemporales);
        videoOverlay.addEventListener('click', () => {
            mostrarControlesTemporales();
            if (videoElement.paused) videoElement.play();
            else videoElement.pause();
        });

        function abrirReproductor(titulo) {
            tituloReproductor.innerText = titulo;
            reproductorFlotante.classList.remove('translate-y-full', 'opacity-0');
        }

        function cerrarReproductor() {
            destruirReproductores();
            reproductorFlotante.classList.add('translate-y-full', 'opacity-0');
        }

        btnCerrar.addEventListener('click', cerrarReproductor);

        // REPRODUCTOR MULTIMEDIA CORE (CON TU PERRO GUARDIÁN DE 20s)
        function destruirReproductores() {
            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
            if (dashInstance) { dashInstance.destroy(); dashInstance = null; }
            if (window.detectorCongelamiento) clearTimeout(window.detectorCongelamiento);
            videoElement.src = "";
            videoElement.load();
        }

        function ejecutarVideo(url, canalId, clearkey) {
            destruirReproductores();
            canalActualId = canalId;
            urlActualVideo = url;
            llavesActuales = clearkey;
            
            mostrarLoader(true, "Conectando con la señal...");
            console.log(`Abriendo stream: ${url}`);

            // ===============================================
            // 🔥 TU PERRO GUARDIÁN CALIBRADO (8s -> 20s) 🔥
            // (¡Y sin afectar tu diseño visual!)
            // ===============================================
            videoElement.onwaiting = () => {
                mostrarLoader(false, "Servidor saturado.\nForzando reconexión...");
                
                // Le damos 20 segundos de tolerancia (20000ms)
                window.detectorCongelamiento = setTimeout(() => {
                    console.log("El video no reacciona. Reiniciando conexión...");
                    ejecutarVideo(url, canalId, clearkey); 
                }, 20000); 
            };

            videoElement.onplaying = () => {
                if (window.detectorCongelamiento) clearTimeout(window.detectorCongelamiento);
                ocultarLoader();
            };
            // ==========================================

            videoElement.oncanplay = () => {
                videoElement.volume = 1.0;
                videoElement.muted = false;
                updatePlayIcons();
                mostrarControlesTemporales();
            };

            videoElement.onerror = () => {
                console.error("Error nativo del tag video. Intentando rescate...");
                mostrarLoader(true, `Error de señal. Reintentando...`);
                setTimeout(() => ejecutarVideo(urlActualVideo, canalActualId, llavesActuales), 3000);
            };

            // SELECCIÓN DE MOTOR DE REPRODUCCIÓN (DASH / HLS / DIRECTO)
            if (clearkey || url.includes('.mpd')) {
                dashInstance = dashjs.MediaPlayer().create();
                dashInstance.initialize(videoElement, url, true);
                if (clearkey) {
                    dashInstance.setProtectionData({ "org.w3.clearkey": { "clearkeys": clearkey } });
                }
            } 
            else if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({ maxMaxBufferLength: 10, enableWorker: true, lowLatencyMode: true });
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(videoElement);
                    hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            console.warn("Fatal HLS error:", data.type);
                            hlsInstance.destroy();
                            ejecutarVideo(url, canalId, clearkey);
                        }
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } 
            else {
                videoElement.src = url;
                videoElement.play().catch(() => {});
            }
        }

        // LLAMADAS AL SERVIDOR BACKEND (ACCIONES)
        function cargarOpcionCanal(idOpcion, nombreCanal) {
            abrirReproductor(nombreCanal);
            mostrarLoader(true, "Abriendo transmisiones remotas...");

            fetch(`${API_URL}/api/canal/${idOpcion}`)
                .then(res => res.json())
                .then(res => {
                    if (res.exito && res.url) ejecutarVideo(res.url, idOpcion, res.clearkey);
                    else { mostrarLoader(false, "Error: Señal caída temporalmente."); }
                })
                .catch(err => {
                    console.error(err);
                    mostrarLoader(false, "Error crítico de conexión.");
                });
        }

        // DESCARGA Y RENDERIZADO DEL MENÚ (TU DISEÑO DE TARJETAS ORIGINAL)
        function descargarListaCanales() {
            fetch(`${API_URL}/api/canales`)
                .then(res => res.json())
                .then(data => {
                    canalesData = data;
                    renderizarLista(data);
                })
                .catch(() => mostrarLoader(false, "Error de red: No se pudo descargar la lista."));
        }

        // ¡RESTAURADA LA BELLEZA DE TU LISTA ORIGINAL!
        function renderizarLista(datos) {
            listaCategoriasContenedor.innerHTML = "";
            let categorias = {};

            datos.forEach(canal => {
                if (!categorias[canal.categoria]) categorias[canal.categoria] = [];
                categorias[canal.categoria].push(canal);
            });

            for (let cat in categorias) {
                // TARJETA DE CATEGORÍA HERMOSA
                let tarjetaCat = document.createElement('div');
                tarjetaCat.className = "bg-brand-card p-6 rounded-3xl border border-brand-border shadow-2xl";
                
                // TÍTULO DE CATEGORÍA
                tarjetaCat.innerHTML = `<h2 class="text-xs font-black uppercase tracking-widest text-brand-accent mb-6 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-brand-accent"></span>${cat}</h2>`;
                
                // GRILLA DE CANALES DENTRO DE LA CATEGORÍA
                let divContenedorCanales = document.createElement('div');
                divContenedorCanales.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4";

                categorias[cat].forEach(canal => {
                    // CADA CANAL ELEGANTEMENTE DISEÑADO
                    let itemCanal = document.createElement('div');
                    itemCanal.className = "bg-brand-bg p-3 rounded-2xl border border-brand-border flex flex-col items-center justify-center text-center group cursor-pointer transition-all hover:border-brand-accent hover:shadow-lg hover:-translate-y-1";
                    
                    itemCanal.innerHTML = `
                        <img src="${canal.logo}" onerror="this.src='https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=120&auto=format&fit=crop'" class="w-14 h-14 object-cover rounded-xl bg-black p-1 border border-brand-border group-hover:border-brand-accent transition-colors mb-3 shadow-inner">
                        <p class="text-xs font-semibold text-gray-200 group-hover:text-white truncate w-full px-1">${canal.nombre}</p>
                    `;

                    // Al hacer clic, carga la Opción 1 de forma directa y limpia (sin EPG)
                    itemCanal.addEventListener('click', () => {
                        if (canal.opciones && canal.opciones.length > 0) {
                            cargarOpcionCanal(canal.opciones[0].id, canal.nombre);
                        }
                    });

                    divContenedorCanales.appendChild(itemCanal);
                });
                tarjetaCat.appendChild(divContenedorCanales);
                listaCategoriasContenedor.appendChild(tarjetaCat);
            }
        }

        // FILTRO DINÁMICO DEL BUSCADOR
        buscador.addEventListener('input', (e) => {
            let texto = e.target.value.toLowerCase().trim();
            if (!texto) { renderizarLista(canalesData); return; }

            let filtrados = canalesData.filter(canal => 
                canal.nombre.toLowerCase().includes(texto) || 
                canal.categoria.toLowerCase().includes(texto)
            );
            renderizarLista(filtrados);
        });

        // MANEJO DE CONTROLES MULTIMEDIA ORIGINALES
        function updatePlayIcons() {
            btnPlay.innerText = videoElement.paused ? "▶" : "⏸";
        }
        videoElement.addEventListener('play', updatePlayIcons);
        videoElement.addEventListener('pause', updatePlayIcons);

        btnPlay.addEventListener('click', () => { if (videoElement.paused) videoElement.play(); else videoElement.pause(); });
        
        btnMute.addEventListener('click', () => {
            videoElement.muted = !videoElement.muted;
            btnMute.innerText = videoElement.muted ? "🔇" : "🔊";
        });

        btnFull.addEventListener('click', () => {
            let contenedorVideo = videoElement.parentElement;
            if (!document.fullscreenElement) {
                contenedorVideo.requestFullscreen().catch(() => {});
                btnFull.innerText = "❌";
            } else {
                document.exitFullscreen();
                btnFull.innerText = "📺";
            }
        });

        // RECURSOS COMPLEMENTARIOS
        function iniciarReloj() {
            setInterval(() => {
                let f = new Date();
                let h = String(f.getHours()).padStart(2, '0');
                let m = String(f.getMinutes()).padStart(2, '0');
                document.getElementById('reloj').innerText = `${h}:${m}`;
            }, 1000);
        }

        window.onload = () => {
            descargarListaCanales(); 
            iniciarReloj();
        };
    </script>
</body>
</html>
