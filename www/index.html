<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- INHIBIDOR 1: Evita que el servidor sepa que pides el video desde tu app o sitio web -->
    <meta name="referrer" content="no-referrer">
    <title>CASTA-APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4 sm:p-6 font-sans">

    <div class="max-w-5xl w-full">
        <h1 class="text-2xl sm:text-4xl font-bold mb-2 text-blue-400 text-center uppercase tracking-wider">📺 CASTA-APP ⚽</h1>
        <p class="text-gray-400 text-center mb-6 text-sm sm:text-base">Canales actualizados vía Backend</p>

        <div id="listaCanales" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6"></div>

        <!-- Contenedor del Video -->
        <div class="bg-black w-full aspect-video rounded-xl overflow-hidden shadow-2xl relative border-2 border-gray-800 flex items-center justify-center">
            <video id="reproductor" class="w-full h-full outline-none focus:ring-4 focus:ring-blue-500" controls tabindex="0" autoplay playsinline></video>
            
            <!-- Spinner de Carga -->
            <div id="loading" class="absolute hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
            </div>
        </div>

        <div id="mensajeError" class="mt-4 text-red-500 text-center hidden font-semibold bg-red-900/30 p-3 sm:p-4 rounded-lg border border-red-800"></div>
    </div>

    <script>
        const videoElement = document.getElementById('reproductor');
        const listaCanalesDiv = document.getElementById('listaCanales');
        const mensajeError = document.getElementById('mensajeError');
        const loader = document.getElementById('loading');
        let hls; 

        // CONFIGURACIÓN: Tu URL de Render
        const API_URL = "https://casta-app.onrender.com"; 

        const misCanales = [
            { nombre: "DirecTv Sports", id: "dsports" },
            { nombre: "TNT Sports", id: "tnt" },
            { nombre: "ESPN Premium", id: "espn" },
            { nombre: "Fox Sports", id: "fox" }
        ];

        function renderizarCanales() {
            listaCanalesDiv.innerHTML = '';
            misCanales.forEach((canal) => {
                const boton = document.createElement('button');
                boton.className = "bg-gray-800 hover:bg-blue-600 focus:bg-blue-600 focus:ring-4 focus:ring-white outline-none border border-gray-700 text-white font-semibold py-4 px-4 rounded-xl transition duration-200 truncate shadow-md text-base sm:text-lg cursor-pointer";
                boton.innerText = canal.nombre;
                boton.onclick = () => obtenerEnlaceServidor(canal.id);
                listaCanalesDiv.appendChild(boton);
            });
        }

      
        // Función para pedir el enlace al server.js en Render
        async function obtenerEnlaceServidor(canalId) {
            mensajeError.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/get-stream/${canalId}`);
                const data = await res.json();
                
                if (data.exito) {
                    ejecutarHLS(data.url);
                } else {
                    throw new Error("No se pudo obtener el enlace");
                }
            } catch (err) {
                loader.classList.add('hidden');
                mensajeError.classList.remove('hidden');
                mensajeError.innerText = "Error: El servidor de Render no responde o el canal no está disponible.";
            }
        }

        function ejecutarHLS(url) {
            videoElement.volume = 1.0;
            videoElement.muted = false;

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                // Configuración agresiva para intentar saltar CORS y timeouts
                hls = new Hls({
                    debug: true, // Esto nos ayudará a ver qué pasa en la consola del navegador (F12)
                    xhrSetup: function(xhr) {
                        xhr.withCredentials = false;
                    },
                    // Tiempo límite antes de declarar que la señal no carga (10 segundos)
                    manifestLoadingMaxRetry: 2,
                    manifestLoadingTimeOut: 10000,
                    levelLoadingMaxRetry: 2,
                    levelLoadingTimeOut: 10000
                });

                hls.loadSource(url);
                hls.attachMedia(videoElement);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loader.classList.add('hidden');
                    videoElement.play().catch(() => {
                        console.log("Autoplay con sonido bloqueado. Iniciando en mudo...");
                        videoElement.muted = true;
                        videoElement.play();
                    });
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        loader.classList.add('hidden');
                        mensajeError.classList.remove('hidden');
                        
                        // Diagnóstico detallado del error
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            if (data.response && data.response.code === 403) {
                                mensajeError.innerText = "🚫 Error 403 (Prohibido): El servidor original detectó que no estamos en su web oficial. Bloqueo por Referer/CORS o IP expirada.";
                            } else if (data.response && data.response.code === 0) {
                                mensajeError.innerText = "🚧 Error de CORS: El servidor original bloquea la reproducción en otros sitios web.";
                            } else {
                                mensajeError.innerText = "❌ Error de red: No se pudo conectar con el servidor de video (Timeout).";
                            }
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            mensajeError.innerText = "⚠️ Error de decodificación: El formato del video no es compatible o está corrupto.";
                        } else {
                            mensajeError.innerText = "💥 Error fatal desconocido al intentar reproducir.";
                        }
                    }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = url;
                videoElement.play();
                loader.classList.add('hidden');
            }
        }

        // Navegación con flechas (TV)
        document.addEventListener('keydown', (e) => {
            const activeElement = document.activeElement;
            const botones = Array.from(listaCanalesDiv.querySelectorAll('button'));
            const currentIndex = botones.indexOf(activeElement);

            if (currentIndex > -1) {
                let col = window.innerWidth >= 1024 ? 4 : (window.innerWidth >= 640 ? 2 : 1);
                let next;
                if (e.key === 'ArrowRight') next = currentIndex + 1;
                if (e.key === 'ArrowLeft') next = currentIndex - 1;
                if (e.key === 'ArrowDown') next = currentIndex + col;
                if (e.key === 'ArrowUp') next = currentIndex - col;

                if (next >= 0 && next < botones.length) {
                    e.preventDefault();
                    botones[next].focus();
                } else if (e.key === 'ArrowDown' && next >= botones.length) {
                    e.preventDefault();
                    videoElement.focus();
                }
            } else if (activeElement === videoElement && e.key === 'ArrowUp') {
                e.preventDefault();
                if (botones.length > 0) botones[0].focus();
            }
        });

        window.onload = () => {
            renderizarCanales();
            // Cargar el primero por defecto al entrar
            if (misCanales.length > 0) obtenerEnlaceServidor(misCanales[0].id);
        };
    </script>
</body>
</html>
