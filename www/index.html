<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cargando CASTA-APP...</title>
    <style>
        body { 
            background-color: black; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        /* Un pequeño círculo de carga para que el usuario no vea una pantalla negra vacía */
        .loader {
            border: 4px solid #1f2937; /* Gris oscuro */
            border-top: 4px solid #3b82f6; /* Azul */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // ⚡ AQUÍ ESTÁ LA MAGIA DE LA REDIRECCIÓN
        // Cuando la app abre este archivo, instantáneamente viaja a tu servidor web.
        // Asegúrate de que esta sea la URL correcta de tu Render:
        window.onload = function() {
            window.location.replace("https://casta-app.onrender.com");
        };
    </script>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
